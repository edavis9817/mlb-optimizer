[theme]
base                     = "light"
primaryColor             = "#2b5cc8"
backgroundColor          = "#f0f2f6"
secondaryBackgroundColor = "#e8ebf0"
textColor                = "#2d3748"
font                     = "sans serif"

[server]
maxUploadSize        = 50
enableCORS           = false
enableXsrfProtection = true
headless             = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[cache]
# Persistent disk cache for multi-user performance
# Survives app restarts and reduces R2 bandwidth usage
maxEntries = 1000
ttlSeconds = 86400  # 24 hours

[logger]
level = "warning"

[theme]
base                     = "dark"
primaryColor             = "#3b6fd4"
backgroundColor          = "#111927"
secondaryBackgroundColor = "#18243a"
textColor                = "#d6e8f8"
font                     = "sans serif"

[server]
maxUploadSize        = 50
enableCORS           = false
enableXsrfProtection = true
headless             = true

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[cache]
# Persistent disk cache for multi-user performance
# Survives app restarts and reduces R2 bandwidth usage
maxEntries = 1000
ttlSeconds = 86400  # 24 hours

[logger]
level = "warning"

services:
  - type: web
    name: mlb-roster-simulator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app/streamlit_app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    plan: starter
    envVars:
      - key: R2_BASE_URL
        sync: false          # Set manually in Render dashboard — never commit the value
      - key: PYTHON_VERSION
        value: "3.11.0"
